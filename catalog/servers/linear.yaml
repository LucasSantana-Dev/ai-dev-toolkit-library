id: linear
name: Linear
description: Read + write Linear issues, projects, cycles, comments, and documents. Uses a local stdio wrapper against Linear's GraphQL API — your API key never leaves your machine.
transport: stdio
command: npx
args:
  - -y
  - "@tacticlaunch/mcp-linear"
env:
  - name: LINEAR_API_KEY
    description: Linear personal API key (Settings → Account → API → Personal API keys). Stays local.
    required: true
tags:
  - project-mgmt
  - issues
  - linear
homepage: https://github.com/tacticlaunch/mcp-linear
license: MIT
